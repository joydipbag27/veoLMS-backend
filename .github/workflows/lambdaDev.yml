name: Deploy Dev Backend (Serverless)

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    if: |
      contains(github.event.head_commit.message, '[deploy-dev-serverless-backend]') ||
      contains(github.event.head_commit.message, '[deploy-dev-serverless-trashCleaner]') ||
      contains(github.event.head_commit.message, '[deploy-dev-serverless-fileCleaner]') ||
      contains(github.event.head_commit.message, '[deploy-dev-serverless-warning]') ||
      contains(github.event.head_commit.message, '[deploy-dev-serverless]')
    runs-on: ubuntu-latest

    env:
      # 🔐 AWS Credentials
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 🔐 App Environment Variables
      DB_URL: ${{ secrets.DB_URL_DEV }}
      REDIS_URL: ${{ secrets.REDIS_URL_DEV }}
      BLACK_BLAZE_ENDPOINT: ${{ secrets.BLACK_BLAZE_ENDPOINT_DEV }}
      BLACK_BLAZE_REGION: ${{ secrets.BLACK_BLAZE_REGION_DEV }}
      BLACK_BLAZE_ACCESS_KEY_ID: ${{ secrets.BLACK_BLAZE_ACCESS_KEY_ID_DEV }}
      BLACK_BLAZE_SECRET: ${{ secrets.BLACK_BLAZE_SECRET_DEV }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME_DEV }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_DEV }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET_DEV }}
      CLIENT_URL_1: ${{ secrets.CLIENT_URL_1_DEV }}
      CLIENT_URL_2: ${{ secrets.CLIENT_URL_2_DEV }}
      RESEND_KEY: ${{ secrets.RESEND_KEY_DEV }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET_DEV }}
      RAZORPAY_ID: ${{ secrets.RAZORPAY_ID_DEV }}
      RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET_DEV }}
      S3_THUMBNAIL_BUCKET: ${{secrets.S3_THUMBNAIL_BUCKET}}
      S3_THUMBNAIL_REGION: ${{secrets.S3_THUMBNAIL_REGION}}
      S3_THUMBNAIL_ACCESS_KEY_ID: ${{secrets.S3_THUMBNAIL_ACCESS_KEY_ID}}
      S3_THUMBNAIL_SECRET: ${{secrets.S3_THUMBNAIL_SECRET}}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: 📦 Install dependencies (root)
        run: npm ci

      - name: 📦 Install dependencies (lambda)
        run: |
          cd lambda
          npm ci
          cd ..

      - name: ⚡ Install Serverless v3
        run: npm install -g serverless@3

      - name: 🚀 Deploy Backend Function
        if: contains(github.event.head_commit.message, '[deploy-dev-serverless-backend]')
        run: serverless deploy function -f backend --stage dev

      - name: 🚀 Deploy Trash Cleaner
        if: contains(github.event.head_commit.message, '[deploy-dev-serverless-trashCleaner]')
        run: serverless deploy function -f trashCleaner --stage dev

      - name: 🚀 Deploy File Cleaner
        if: contains(github.event.head_commit.message, '[deploy-dev-serverless-fileCleaner]')
        run: serverless deploy function -f fileCleaner --stage dev

      - name: 🚀 Deploy Warning Function
        if: contains(github.event.head_commit.message, '[deploy-dev-serverless-warning]')
        run: serverless deploy function -f warningFunction --stage dev

      - name: 🔥 Full Deploy (All Services)
        if: contains(github.event.head_commit.message, '[deploy-dev-serverless]')
        run: serverless deploy --stage dev
        
      - name: ✅ Deployment Completed
        run: echo "Deployment finished successfully 🚀"

        # serverless deploy --stage prod  (For production deploy) 
