name: Deploy Backend (Serverless)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: |
      contains(github.event.head_commit.message, '[deploy-serverless-backend]') ||
      contains(github.event.head_commit.message, '[deploy-serverless-trashCleaner]') ||
      contains(github.event.head_commit.message, '[deploy-serverless-fileCleaner]') ||
      contains(github.event.head_commit.message, '[deploy-serverless-warning]') ||
      contains(github.event.head_commit.message, '[deploy-serverless]')
    runs-on: ubuntu-latest

    env:
      # 🔐 AWS Credentials
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 🔐 App Environment Variables
      DB_URL: ${{ secrets.DB_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      BLACK_BLAZE_ENDPOINT: ${{ secrets.BLACK_BLAZE_ENDPOINT }}
      BLACK_BLAZE_REGION: ${{ secrets.BLACK_BLAZE_REGION }}
      BLACK_BLAZE_ACCESS_KEY_ID: ${{ secrets.BLACK_BLAZE_ACCESS_KEY_ID }}
      BLACK_BLAZE_SECRET: ${{ secrets.BLACK_BLAZE_SECRET }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLIENT_URL_1: ${{ secrets.CLIENT_URL_1 }}
      CLIENT_URL_2: ${{ secrets.CLIENT_URL_2 }}
      RESEND_KEY: ${{ secrets.RESEND_KEY }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
      RAZORPAY_ID: ${{ secrets.RAZORPAY_ID }}
      RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}
      S3_THUMBNAIL_BUCKET: ${{secrets.S3_THUMBNAIL_BUCKET}}
      S3_THUMBNAIL_REGION: ${{secrets.S3_THUMBNAIL_REGION}}
      S3_THUMBNAIL_ACCESS_KEY_ID: ${{secrets.S3_THUMBNAIL_ACCESS_KEY_ID}}
      S3_THUMBNAIL_SECRET: ${{secrets.S3_THUMBNAIL_SECRET}}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: 📦 Install dependencies (root)
        run: npm ci

      - name: 📦 Install dependencies (lambda)
        run: |
          cd lambda
          npm ci
          cd ..

      - name: ⚡ Install Serverless v3
        run: npm install -g serverless@3

      - name: 🚀 Deploy Backend Function
        if: contains(github.event.head_commit.message, '[deploy-serverless-backend]')
        run: serverless deploy function -f backend --stage prod

      - name: 🚀 Deploy Trash Cleaner
        if: contains(github.event.head_commit.message, '[deploy-serverless-trashCleaner]')
        run: serverless deploy function -f trashCleaner --stage prod

      - name: 🚀 Deploy File Cleaner
        if: contains(github.event.head_commit.message, '[deploy-serverless-fileCleaner]')
        run: serverless deploy function -f fileCleaner --stage prod

      - name: 🚀 Deploy Warning Function
        if: contains(github.event.head_commit.message, '[deploy-serverless-warning]')
        run: serverless deploy function -f warningFunction --stage prod

      - name: 🔥 Full Deploy (All Services)
        if: contains(github.event.head_commit.message, '[deploy-serverless]')
        run: serverless deploy --stage prod
        
      - name: ✅ Deployment Completed
        run: echo "Deployment finished successfully 🚀"

        # serverless deploy --stage dev  (For dev deploy)
        
